apiVersion: apps/v1
kind: Deployment
metadata:
  name: foodfrenzy-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: foodfrenzy
      version: green
  template:
    metadata:
      labels:
        app: foodfrenzy
        version: green
    spec:
      containers:
        - name: foodfrenzy
          image: 119750095825.dkr.ecr.ap-southeast-2.amazonaws.com/foodfrenzy-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: foodfrenzy-secrets
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: foodfrenzy-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodfrenzy-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
